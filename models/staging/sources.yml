version: 2

sources:
  - name: bronze
    database: PORTFOLIO_ANALYTICS
    schema: BRONZE
    description: "Raw data landing zone - Bronze layer"
    tables:
      - name: raw_fx_rates
        description: "Raw FX exchange rates from Reuters"
        columns:
          - name: rate_id
            description: "Unique rate identifier"
            tests:
              - not_null
              - unique
          - name: exchange_rate
            description: "Exchange rate value"
            tests:
              - not_null

      - name: raw_portfolio_master
        description: "Raw portfolio reference data"
        columns:
          - name: portfolio_id
            description: "Unique portfolio identifier"
            tests:
              - not_null
              - unique

      - name: raw_security_prices
        description: "Raw daily OHLCV security prices"
        columns:
          - name: price_id
            description: "Unique price record identifier"
            tests:
              - not_null
              - unique
          - name: security_id
            tests:
              - not_null

      - name: raw_security_reference
        description: "Raw security reference/master data"
        columns:
          - name: security_id
            description: "Unique security identifier"
            tests:
              - not_null
              - unique
          - name: isin
            tests:
              - not_null

      - name: raw_transactions
        description: "Raw trade/transaction records"
        columns:
          - name: transaction_id
            description: "Unique transaction identifier"
            tests:
              - not_null
              - unique
          - name: portfolio_id
            tests:
              - not_null
          - name: security_id
            tests:
              - not_null
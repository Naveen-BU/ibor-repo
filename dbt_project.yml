name: 'portfolio_analytics'
version: '1.0.0'
config-version: 2

profile: 'portfolio_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

on-run-end:
  - "{{ log_dq_results(results) }}"

vars:
  # Default date range for incremental models
  start_date: '2024-01-01'
  # Base reporting currency
  base_currency: 'USD'

models:
  portfolio_analytics:
    staging:
      +schema: bronze
      +materialized: view
      +tags: ['staging', 'bronze']
    intermediate:
      +schema: silver
      +materialized: table
      +tags: ['intermediate', 'silver']
    marts:
      +schema: gold
      +materialized: table
      +tags: ['marts', 'gold']

portfolio_analytics:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: hc01247.central-india.azure

      # User/password auth
      user: DBT_SERVICE_USER
      password: doe

      role: DBT_ROLE
      database: PORTFOLIO_ANALYTICS
      warehouse: PORTFOLIO_WH
      # in the future you should switch this schema to use a new environment variable
      # definitely switch this to your schema though
      schema: SILVER
      threads: 4
      client_session_keep_alive: False
      query_tag: 'dbt_cloud'

    prod:
      type: snowflake
      account: hc01247.central-india.azure

      # User/password auth
      user: DBT_SERVICE_USER
      password: doe

      role: DBT_ROLE
      database: PORTFOLIO_ANALYTICS
      warehouse: DBT_WH
      schema: SILVER
      threads: 4
      client_session_keep_alive: False
      query_tag: 'dbt_cloud_prod'
